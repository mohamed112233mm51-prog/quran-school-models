name: Publish Quran model to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare model files
        shell: bash
        run: |
          set -euo pipefail

          REVISION="86aa2ae915f3b11c60b4c031774a7b5123477ba5"
          MODEL_ID="eventhorizon0/tarteel-ai-onnx-whisper-base-ar-quran"
          SOURCE="https://huggingface.co/${MODEL_ID}/resolve/${REVISION}"
          TARGET="site/${MODEL_ID}/resolve/${REVISION}"

          mkdir -p "${TARGET}/onnx"

          download_file() {
            local remote_path="$1"
            local local_path="$2"
            echo "Downloading ${remote_path}"
            curl --fail --location \
              --retry 20 \
              --retry-all-errors \
              --retry-delay 10 \
              --connect-timeout 30 \
              --max-time 3600 \
              "${SOURCE}/${remote_path}?download=true" \
              --output "${local_path}"
          }

          # Tokenizer and model configuration files.
          download_file "added_tokens.json" "${TARGET}/added_tokens.json"
          download_file "config.json" "${TARGET}/config.json"
          # The converted repository has an incomplete Whisper generation_config.json
          # that is missing multilingual language metadata. Use the official
          # OpenAI Whisper Base generation config because the tokenizer IDs and
          # architecture are the same, then force Arabic transcription in the app.
          curl --fail --location \
            --retry 20 \
            --retry-all-errors \
            --retry-delay 10 \
            --connect-timeout 30 \
            --max-time 3600 \
            "https://huggingface.co/openai/whisper-base/resolve/main/generation_config.json?download=true" \
            --output "${TARGET}/generation_config.json"
          download_file "merges.txt" "${TARGET}/merges.txt"
          download_file "normalizer.json" "${TARGET}/normalizer.json"
          download_file "preprocessor_config.json" "${TARGET}/preprocessor_config.json"
          download_file "special_tokens_map.json" "${TARGET}/special_tokens_map.json"
          download_file "tokenizer.json" "${TARGET}/tokenizer.json"
          download_file "tokenizer_config.json" "${TARGET}/tokenizer_config.json"
          download_file "vocab.json" "${TARGET}/vocab.json"

          # Browser-friendly Q4 ONNX files used by the application.
          download_file "onnx/config.json" "${TARGET}/onnx/config.json"
          download_file "onnx/encoder_model_q4.onnx" "${TARGET}/onnx/encoder_model_q4.onnx"
          download_file "onnx/decoder_model_merged_q4.onnx" "${TARGET}/onnx/decoder_model_merged_q4.onnx"

          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="ar" dir="rtl">
            <head><meta charset="utf-8"><title>Quran School Models</title></head>
            <body><h1>Quran School Models</h1><p>Static model files for the Quran school application.</p></body>
          </html>
          HTML

          cat > "${TARGET}/MODEL_NOTICE.txt" <<'TXT'
          Model: eventhorizon0/tarteel-ai-onnx-whisper-base-ar-quran
          Source model: tarteel-ai/whisper-base-ar-quran
          License: Apache-2.0
          Hosted only to allow the Quran school browser application to download the open model reliably.
          TXT

          touch site/.nojekyll
          find site -type f -print0 | sort -z | xargs -0 sha256sum > site/SHA256SUMS.txt
          du -sh site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
